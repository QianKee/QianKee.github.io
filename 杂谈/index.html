<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>杂谈 | QianK's Blog</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f7f7f4;
      color: #202124;
      line-height: 1.7;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 24px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .back {
      color: #406cff;
      font-weight: 700;
      transition: opacity 0.2s ease;
    }
    
    .back:hover {
      opacity: 0.8;
    }

    h1 {
      margin: 32px 0 24px;
      font-size: 42px;
      letter-spacing: -0.04em;
    }

    .post-list {
      display: grid;
      gap: 16px;
    }

    .post {
      display: block;
      padding: 22px 24px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(32, 33, 36, 0.1);
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(30, 35, 50, 0.08);
      transition: 0.2s ease;
    }

    .post:hover {
      transform: translateY(-3px);
      border-color: rgba(64, 108, 255, 0.3);
    }

    .post h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .post p {
      margin: 0;
      color: #696f7a;
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="../index.html">← 返回首页</a>

    <h1>杂谈</h1>

    <div class="post-list">
      <a class="post" href="./沙特游记.html">
        <h2>沙特游记</h2>
        <p>神秘中东国家</p>
      </a>
    </div>
  </main>
</body>
</html>
