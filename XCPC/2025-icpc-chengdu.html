<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2025-ICPC-成都站 | QianK's Blog</title>
  <style>
    :root {
      --bg: #f7f7f4;
      --card: rgba(255, 255, 255, 0.86);
      --text: #202124;
      --muted: #696f7a;
      --line: rgba(32, 33, 36, 0.1);
      --accent: #406cff;
      --shadow: 0 18px 50px rgba(30, 35, 50, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.85;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 48px 24px;
      display: grid;
      grid-template-columns: minmax(0, 820px) 220px;
      gap: 42px;
      align-items: start;
    }

    .back {
      display: inline-block;
      margin-bottom: 28px;
      color: var(--accent);
      font-weight: 700;
    }

    article {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 38px;
      line-height: 1.2;
      letter-spacing: -0.04em;
    }

    .meta {
      margin-bottom: 36px;
      color: var(--muted);
      font-size: 14px;
    }

    h2 {
      margin: 44px 0 16px;
      font-size: 24px;
      scroll-margin-top: 28px;
    }

    p {
      margin: 0 0 18px;
      font-size: 16px;
    }

    code {
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(64, 108, 255, 0.08);
      color: var(--accent);
    }

    .toc {
      position: sticky;
      top: 32px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .toc-title {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 800;
    }

    .toc a {
      display: block;
      padding: 7px 0;
      color: var(--muted);
      font-size: 14px;
      transition: 0.2s ease;
    }

    .toc a:hover {
      color: var(--accent);
      transform: translateX(3px);
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .toc {
        position: static;
        order: -1;
      }

      article {
        padding: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main>
      <a class="back" href="./index.html">← 返回 XCPC</a>

      <article>
        <h1>2025-ICPC-成都站</h1>
        <div class="meta">XCPC · ICPC · 2025</div>

        <h2 id="intro">概要</h2>
        <p>本场比赛压哨绝杀铜牌，感谢队友带飞</p>

        <h2 id="day-n">day -n</h2>
        <p>待补。</p>

        <h2 id="day-1">day -1</h2>
        <p>待补。</p>

        <h2 id="contest">day 1</h2>
        <p>待补。</p>

        <h2 id="postscript">PostScript</h2>
        <p>总结待补。</p>
      </article>
    </main>

    <aside class="toc">
      <div class="toc-title">目录</div>
      <a href="#intro">概要</a>
      <a href="#day-n">day -n</a>
      <a href="#day-1">day -1</a>
      <a href="#contest">day 1</a>
      <a href="#postscript">PostScript</a>
    </aside>
  </div>
</body>
</html>
